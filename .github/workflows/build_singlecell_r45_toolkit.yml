name: Build singlecell R45 toolkit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker/singlecell_r45_toolkit/**"
      - ".github/workflows/build_singlecell_r45_toolkit.yml"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/kameronb1/singlecell-r45-toolkit
  IMAGE_TAG: bioc322-r452-20260427
  DOCKERFILE: docker/singlecell_r45_toolkit/Dockerfile

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
