name: build-singlecell-r45-toolkit

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/singlecell_r45_toolkit/Dockerfile"
      - ".github/workflows/build_singlecell_r45_toolkit.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/singlecell_r45_toolkit
          file: docker/singlecell_r45_toolkit/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/singlecell-r45-toolkit:bioc321-seurat540-20260406
            ghcr.io/${{ github.repository_owner }}/singlecell-r45-toolkit:latest
